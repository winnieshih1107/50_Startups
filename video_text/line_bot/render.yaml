services:
  - type: web
    name: yt-notes-line-bot
    runtime: python
    plan: free
    buildCommand: pip install -r video_text/line_bot/requirements.txt
    startCommand: gunicorn --chdir video_text/line_bot --timeout 120 app:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: yt-notes-line-bot-check
    runtime: python
    plan: free
    schedule: "0 0 * * *"  # 每天 UTC 0 點（台灣時間早上 8 點）檢查一次
    buildCommand: pip install requests
    startCommand: >
      python -c "
      import os, requests;
      url = os.environ['CHECK_ALL_URL'];
      secret = os.environ['CRON_SECRET'];
      r = requests.post(url, params={'secret': secret}, timeout=30);
      print(r.status_code, r.text)
      "
    envVars:
      - key: CHECK_ALL_URL
        sync: false
      - key: CRON_SECRET
        sync: false
